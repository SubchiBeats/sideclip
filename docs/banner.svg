<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">SideClip</title>
  <desc id="desc">SideClip, ideas in and attention out, shown beside vertical video cards.</desc>
  <defs>
    <radialGradient id="glow" cx="70%" cy="45%" r="58%">
      <stop offset="0" stop-color="#d8ff3e" stop-opacity=".34"/>
      <stop offset="1" stop-color="#11110f" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="#11110f"/>
  <rect width="1200" height="420" rx="28" fill="url(#glow)"/>
  <path d="M0 330c240-92 405 80 620-8s326-78 580-8" fill="none" stroke="#2d2d28" stroke-width="2"/>
  <g transform="translate(68 73)">
    <circle cx="42" cy="42" r="42" fill="#d8ff3e"/>
    <path d="M22 28h43M22 42h31M22 56h43" fill="none" stroke="#11110f" stroke-width="9" stroke-linecap="round"/>
    <text x="0" y="145" fill="#fcfaf3" font-family="Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="-6">SideClip</text>
    <text x="3" y="190" fill="#aaa89f" font-family="monospace" font-size="16" letter-spacing="4">IDEAS IN. ATTENTION OUT.</text>
    <text x="3" y="252" fill="#fcfaf3" font-family="Arial, sans-serif" font-size="20">Private, self-hosted short-form video studio.</text>
    <g transform="translate(3 280)">
      <rect width="178" height="38" rx="19" fill="#d8ff3e"/>
      <text x="22" y="25" fill="#11110f" font-family="Arial, sans-serif" font-size="13" font-weight="700">ZERO PAID APIS</text>
    </g>
  </g>
  <g filter="url(#shadow)">
    <g transform="translate(770 52) rotate(-8 92 150)">
      <rect width="184" height="316" rx="24" fill="#ff725c" stroke="#fcfaf3" stroke-width="6"/>
      <rect x="18" y="18" width="65" height="22" rx="11" fill="#11110f"/>
      <text x="30" y="33" fill="#fcfaf3" font-family="monospace" font-size="8">STORY</text>
      <text x="18" y="205" fill="#11110f" font-family="Arial, sans-serif" font-weight="800" font-size="24">YOUR NEXT</text>
      <text x="18" y="233" fill="#11110f" font-family="Arial, sans-serif" font-weight="800" font-size="24">IDEA NEEDS</text>
      <text x="18" y="261" fill="#11110f" font-family="Arial, sans-serif" font-weight="800" font-size="24">A HOOK.</text>
    </g>
    <g transform="translate(940 42) rotate(7 92 150)">
      <rect width="184" height="316" rx="24" fill="#20201d" stroke="#fcfaf3" stroke-width="6"/>
      <circle cx="92" cy="117" r="53" fill="#d8ff3e"/>
      <circle cx="76" cy="109" r="6" fill="#11110f"/>
      <circle cx="108" cy="109" r="6" fill="#11110f"/>
      <path d="M72 135q20 18 40 0" fill="none" stroke="#11110f" stroke-width="5" stroke-linecap="round"/>
      <text x="18" y="224" fill="#fcfaf3" font-family="Arial, sans-serif" font-weight="800" font-size="23">MAKE IT</text>
      <text x="18" y="252" fill="#fcfaf3" font-family="Arial, sans-serif" font-weight="800" font-size="23">WORTH</text>
      <text x="18" y="280" fill="#d8ff3e" font-family="Arial, sans-serif" font-weight="800" font-size="23">WATCHING.</text>
    </g>
  </g>
</svg>
